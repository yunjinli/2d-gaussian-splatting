[workspace]
name = "surfel_splatting"
version = "0.1.0"
description = "Surfel Splatting environment"
channels = ["conda-forge"]
# Removed win-64 so Pixi only solves for your current Linux environment
platforms = ["linux-64"] 

# [system-requirements]
# cuda = "11.8"
[activation]
scripts = ["setup_cuda.sh"]

[dependencies]
python = "3.10.*"
pip = "23.3.1.*"
ffmpeg = "4.2.2.*"
pillow = "<10" 
typing_extensions = "*"
gcc_linux-64 = "11.*"  # Downgraded from 11
gxx_linux-64 = "11.*"  # Downgraded from 11
ninja = "*"

[pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/cu128"]

[pypi-dependencies]
torch = "==2.7.0" 
torchvision = "==0.22.0"
open3d = "==0.18.0"
mediapy = "==1.1.2"
lpips = "==0.1.4"
scikit-image = "==0.21.0"
tqdm = "*"
trimesh = "==4.3.2"
plyfile = "*"
opencv-python = "*"
viser = "==0.1.29"
splines = ">=0.3.3, <0.4"
lightning = ">=2.6.1, <3"

[tasks]
install-diff-surfel-rasterization = {cmd = "pip install --no-build-isolation ./submodules/diff-surfel-rasterization"}
install-simple-knn = {cmd = "pip install --no-build-isolation ./submodules/simple-knn"}
install-submodules = {depends-on = ["install-diff-surfel-rasterization", "install-simple-knn"]}
